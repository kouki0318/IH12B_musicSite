<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./inside.css">
    <title>課題04</title>
</head>
<body>
  <main class="player-layout">

    <!-- 左レコード -->
    <img id="record1" class="img_record" src="./img/record.jpg">

    <!-- 中央パネル -->
    <div class="center-panel">
      <a href="./index.html">
        <img class="img_logo1" src="img/logo.svg">
      </a>
      <div id="title">
        <h2 id="title_scroll">小さなDJ【ブルーハムハム】</h2>
      </div>
      <div class="a_play">
        <button id="play" class="btn btn-primary">MUSIC START!</button>
      </div>
      <div class="a_volume">
        <button id="volume-up" class="btn btn-success">+</button>
        <button id="volume-down" class="btn btn-success">-</button>
      </div>
      <div class="a_mute">
        <button id="mute" class="btn btn-warning">MUTE ON!</button>
      </div>
    </div>

    <!-- 右レコード -->
    <img id="record2" class="img_record" src="./img/record.jpg">

  </main>
  <script src="main.js"></script>
</body>
</html>
